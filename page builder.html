<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Section Website Builder</title>

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            display: flex;
            height: 100vh;
        }

        /* Sidebar */

        #sidebar {
            width: 230px;
            background: #111;
            color: white;
            padding: 20px;
        }

        #sidebar button {
            width: 100%;
            margin-bottom: 10px;
            padding: 10px;
            border: none;
            background: #333;
            color: white;
            cursor: pointer;
        }

        /* Canvas */

        #canvas {
            flex: 1;
            overflow: auto;
            background: #f4f4f4;
            padding: 30px;
        }

        /* Sections */

        .section {
            background: white;
            margin-bottom: 30px;
            padding: 60px 40px;
            border-radius: 6px;
        }

        /* HERO */

        .hero {
            text-align: center;
            color: white;
            background-size: cover;
            background-position: center;
        }

        .hero h1 {
            font-size: 48px;
            margin: 0;
        }

        .hero p {
            font-size: 20px;
        }

        /* Cards */

        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            background: #fafafa;
            padding: 20px;
            border-radius: 6px;
            text-align: center;
        }

        /* CTA */

        .cta {
            text-align: center;
            background: #111;
            color: white;
        }

        /* Footer */

        .footer {
            background: #222;
            color: white;
            text-align: center;
            font-size: 14px;
        }

        /* editable */

        [contenteditable] {
            outline: none;
            cursor: text;
        }

        img {
            max-width: 100%;
        }
    </style>
</head>

<body>

    <div id="sidebar">

        <h3>Add Section</h3>

        <button onclick="addHero()">Hero</button>
        <button onclick="addCards()">Cards</button>
        <button onclick="addGallery()">Gallery</button>
        <button onclick="addCTA()">CTA</button>
        <button onclick="addFooter()">Footer</button>

        <hr>

        <button onclick="exportPage()">Export HTML</button>

    </div>

    <div id="canvas"></div>

    <script>

        /* HERO */

        function addHero() {

            const hero = `
<section class="section hero" style="background-image:url('https://picsum.photos/1200/600');">

<h1 contenteditable="true">Your Product</h1>

<p contenteditable="true">Build something amazing</p>

<button>Get Started</button>

</section>
`

            canvas.insertAdjacentHTML("beforeend", hero)

        }

        /* CARDS */

        function addCards() {

            const cards = `
<section class="section">

<h2 contenteditable="true">Features</h2>

<div class="cards">

<div class="card">
<h3 contenteditable="true">Fast</h3>
<p contenteditable="true">Super fast performance</p>
</div>

<div class="card">
<h3 contenteditable="true">Secure</h3>
<p contenteditable="true">Security first design</p>
</div>

<div class="card">
<h3 contenteditable="true">Simple</h3>
<p contenteditable="true">Easy to use</p>
</div>

</div>

</section>
`

            canvas.insertAdjacentHTML("beforeend", cards)

        }

        /* GALLERY */

        function addGallery() {

            const gallery = `
<section class="section">

<h2 contenteditable="true">Gallery</h2>

<div class="cards">

<img src="https://picsum.photos/300?1">
<img src="https://picsum.photos/300?2">
<img src="https://picsum.photos/300?3">

</div>

</section>
`

            canvas.insertAdjacentHTML("beforeend", gallery)

        }

        /* CTA */

        function addCTA() {

            const cta = `
<section class="section cta">

<h2 contenteditable="true">Ready to start?</h2>

<p contenteditable="true">Join thousands of users</p>

<button>Sign Up</button>

</section>
`

            canvas.insertAdjacentHTML("beforeend", cta)

        }

        /* FOOTER */

        function addFooter() {

            const footer = `
<footer class="section footer">

<p contenteditable="true">© 2026 Your Company</p>

</footer>
`

            canvas.insertAdjacentHTML("beforeend", footer)

        }

        /* EXPORT */

        function exportPage() {

            let html = document.getElementById("canvas").innerHTML

            // Remove editing attributes
            html = html.replace(/contenteditable="true"/g, "")

            // Full page template
            const page = `
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exported Page</title>

<style>
body{margin:0;font-family:sans-serif}

.section{padding:60px 40px}

.hero{
color:white;
text-align:center;
background-size:cover;
background-position:center
}

.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px
}

.card{
background:#fafafa;
padding:20px
}

.cta{
text-align:center;
background:#111;
color:white
}

.footer{
text-align:center;
background:#222;
color:white
}

img{
max-width:100%
}

</style>
</head>

<body>

${html}

</body>
</html>
`

            // Create downloadable file
            const blob = new Blob([page], { type: "text/html" })
            const link = document.createElement("a")

            link.href = URL.createObjectURL(blob)
            link.download = "index.html"

            document.body.appendChild(link)
            link.click()

            document.body.removeChild(link)

        }

        function downloadFile(filename, content) {

            const blob = new Blob([content], { type: "text/html" })

            const a = document.createElement("a")

            a.href = URL.createObjectURL(blob)
            a.download = filename

            a.click()

        }
    </script>

</body>

</html>
