<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Builder Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            height: 100vh;
            overflow: hidden;
            background: #f0f2f5;
        }

        #sidebar {
            width: 260px;
            background: #212529;
            color: white;
            padding: 20px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        #canvas-container {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        #canvas {
            width: 100%;
            max-width: 1000px;
            background: white;
            min-height: 100%;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
        }

        #inspector {
            width: 300px;
            background: white;
            border-left: 1px solid #dee2e6;
            padding: 20px;
            display: none;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .section-wrapper {
            position: relative;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .section-wrapper:hover {
            border: 2px solid #0d6efd;
        }

        .section-wrapper.active {
            border: 2px solid #0d6efd;
            z-index: 10;
            background: rgba(13, 110, 253, 0.02);
        }

        .section-toolbar {
            position: absolute;
            top: 5px;
            right: 5px;
            display: none;
            z-index: 100;
            background: #0d6efd;
            border-radius: 4px;
            padding: 2px;
        }

        .section-wrapper:hover>.section-toolbar {
            display: flex;
        }

        [contenteditable]:focus {
            outline: 2px solid #0d6efd;
            background: transparent !important;
            border-radius: 4px;
        }

        .removable:hover {
            position: relative;
        }

        .removable:hover::after {
            content: "×";
            position: absolute;
            top: -8px;
            right: -8px;
            background: #dc3545;
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            font-size: 14px;
            line-height: 20px;
            text-align: center;
            cursor: pointer;
            z-index: 20;
            font-weight: bold;
        }

        .inspector-label {
            font-size: 0.75rem;
            font-weight: bold;
            color: #6c757d;
            text-transform: uppercase;
            margin-top: 15px;
            display: block;
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <h5 class="mb-4">Page Sections</h5>
        <div class="d-grid gap-2 mb-4">
            <button class="btn btn-outline-light btn-sm text-start" onclick="addSection('hero')">+ Hero</button>
            <button class="btn btn-outline-light btn-sm text-start" onclick="addSection('cards')">+ Cards /
                Features</button>
            <button class="btn btn-outline-light btn-sm text-start" onclick="addSection('gallery')">+ Gallery</button>
            <button class="btn btn-outline-light btn-sm text-start" onclick="addSection('cta')">+ CTA / Banner</button>
            <button class="btn btn-outline-light btn-sm text-start" onclick="addSection('footer')">+ Footer</button>
        </div>

        <h5 class="mb-3">Content Blocks</h5>
        <small class="text-muted d-block mb-2" style="font-size:0.75rem; line-height:1.2;">
            (added inside selected section)
        </small>
        <div class="d-grid gap-2">
            <button class="btn btn-outline-light btn-sm text-start" onclick="addBlock('text')">+ Text</button>
            <button class="btn btn-outline-light btn-sm text-start" onclick="addBlock('imgtext')">+ Image +
                Text</button>
            <button class="btn btn-outline-light btn-sm text-start" onclick="addBlock('form')">+ Simple Form</button>
            <button class="btn btn-outline-light btn-sm text-start" onclick="addBlock('pricing')">+ Pricing
                Cards</button>
            <button class="btn btn-outline-light btn-sm text-start" onclick="addBlock('testimonial')">+
                Testimonial</button>
            <button class="btn btn-outline-light btn-sm text-start" onclick="addBlock('stats')">+ Stats /
                Counters</button>
        </div>

        <hr class="my-4">

        <button class="btn btn-primary w-100 mb-2" onclick="exportPage()">Export HTML</button>
        <button class="btn btn-outline-secondary w-100 btn-sm" onclick="canvas.innerHTML = ''; closeInspector();">
            Clear Canvas
        </button>
    </div>

    <div id="canvas-container">
        <div id="canvas" onclick="deselect(event)"></div>
    </div>

    <div id="inspector">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="m-0">Settings</h6>
            <button class="btn-close btn-sm" onclick="closeInspector()"></button>
        </div>

        <!-- General Section Settings -->
        <div id="general-settings">
            <label class="inspector-label">Background Color</label>
            <input type="color" class="form-control form-control-color w-100" id="bgColor"
                oninput="updateSectionStyle('backgroundColor', this.value)">

            <label class="inspector-label">Text Color</label>
            <input type="color" class="form-control form-control-color w-100" id="textColor"
                oninput="updateSectionStyle('color', this.value)">

            <label class="inspector-label">Vertical Padding</label>
            <input type="range" class="form-range" min="0" max="5" step="1" id="paddingRange"
                oninput="updatePadding(this.value)">
        </div>

        <!-- Element-specific settings (covers EVERYTHING) -->
        <div id="element-settings" style="display:none;">
            <button class="btn btn-danger btn-sm w-100 mb-3" onclick="removeSelectedElement()">Delete This
                Element</button>

            <!-- Button settings -->
            <div id="button-settings" style="display:none;">
                <label class="inspector-label">Button Style</label>
                <select class="form-select form-select-sm" id="btnStyle" onchange="updateButtonStyle()">
                    <option value="primary">Primary</option>
                    <option value="secondary">Secondary</option>
                    <option value="success">Success</option>
                    <option value="danger">Danger</option>
                    <option value="warning">Warning</option>
                    <option value="info">Info</option>
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                </select>
                <label class="inspector-label mt-3">Button Size</label>
                <select class="form-select form-select-sm" id="btnSize" onchange="updateButtonSize()">
                    <option value="">Normal</option>
                    <option value="btn-sm">Small</option>
                    <option value="btn-lg">Large</option>
                </select>
            </div>

            <!-- Heading settings -->
            <div id="heading-settings" style="display:none;">
                <label class="inspector-label">Heading Level</label>
                <select class="form-select form-select-sm" id="headingLevel" onchange="updateHeadingLevel()">
                    <option value="h1">H1 (Largest)</option>
                    <option value="h2">H2</option>
                    <option value="h3">H3</option>
                    <option value="h4">H4</option>
                    <option value="h5">H5</option>
                    <option value="h6">H6 (Smallest)</option>
                </select>
            </div>

            <!-- Alignment (for headings & paragraphs) -->
            <div id="alignment-settings" style="display:none;">
                <label class="inspector-label">Text Alignment</label>
                <div class="btn-group w-100">
                    <button class="btn btn-sm btn-outline-secondary flex-fill"
                        onclick="setAlignment('start')">Left</button>
                    <button class="btn btn-sm btn-outline-secondary flex-fill"
                        onclick="setAlignment('center')">Center</button>
                    <button class="btn btn-sm btn-outline-secondary flex-fill"
                        onclick="setAlignment('end')">Right</button>
                </div>
            </div>

            <!-- Image + Text layout -->
            <div id="imgtext-settings" style="display:none;">
                <label class="inspector-label">Layout</label>
                <select class="form-select form-select-sm" id="imgtextLayout" onchange="updateImgTextLayout()">
                    <option value="left">Image Left – Text Right</option>
                    <option value="right">Image Right – Text Left</option>
                    <option value="top">Image Top – Text Bottom</option>
                </select>
            </div>

            <!-- Form control settings -->
            <div id="form-control-settings" style="display:none;">
                <label class="inspector-label">Placeholder Text</label>
                <input type="text" class="form-control form-control-sm" id="formPlaceholder"
                    oninput="updateFormPlaceholder(this.value)">
                <label class="inspector-label mt-3">Input Type (if applicable)</label>
                <select class="form-select form-select-sm" id="formType" onchange="updateFormType(this.value)">
                    <option value="text">Text</option>
                    <option value="email">Email</option>
                    <option value="tel">Phone</option>
                    <option value="number">Number</option>
                    <option value="password">Password</option>
                </select>
            </div>
        </div>

        <!-- Quick add inside any section (still available) -->
        <label class="inspector-label mt-4">Quick Add Inside Section</label>
        <div class="d-grid gap-2">
            <button class="btn btn-sm btn-outline-secondary w-100" onclick="addElement('heading')">+ Heading</button>
            <button class="btn btn-sm btn-outline-secondary w-100" onclick="addElement('paragraph')">+
                Paragraph</button>
            <button class="btn btn-sm btn-outline-secondary w-100" onclick="addElement('button')">+ Button</button>
            <button class="btn btn-sm btn-outline-secondary w-100" onclick="addElement('image')">+ Standalone
                Image</button>
        </div>

        <!-- Image Tools -->
        <div id="image-tools">
            <label class="inspector-label mt-4">Image Tools</label>
            <button class="btn btn-sm btn-outline-primary w-100 mb-2" id="addPhotoBtn" onclick="addPhoto()">+ Add Photo
                to Gallery</button>
            <label class="inspector-label">Image / BG URL</label>
            <input type="text" class="form-control form-control-sm" id="imgUrl" placeholder="https://..."
                oninput="updateImage(this.value)">
            <small class="text-muted d-block mt-1" style="font-size:0.7rem;">Click any image to edit</small>
        </div>

        <div id="card-tools" style="display:none;">
            <label class="inspector-label mt-3">Cards</label>
            <button class="btn btn-sm btn-outline-primary w-100" onclick="addColumn()">+ Add Card</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const inspector = document.getElementById('inspector');
        let activeWrapper = null;
        let selectedElement = null;
        let selectedImgElement = null;

        const templates = {
            hero: `<section class="py-5 text-center" style="background-color:#343a40;color:#fff;background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://picsum.photos'); background-size: cover; background-position: center;">
                <div class="container py-5"><h1 class="display-4 fw-bold" contenteditable="true">Modern Design</h1><p class="lead" contenteditable="true">Right-click buttons or images to delete them.</p>
                <button class="btn btn-primary btn-lg px-4 mt-3">Get Started</button></div></section>`,
            cards: `<section class="py-5 bg-light"><div class="container"><div class="row g-4 justify-content-center card-row">
                <div class="col-md-4"><div class="card h-100 border-0 shadow-sm"><div class="card-body"><h5 contenteditable="true">Feature</h5><p contenteditable="true">Description.</p></div></div></div>
            </div></div></section>`,
            gallery: `<section class="py-5" style="background-color: #ffffff;"><div class="container"><div class="row g-3 justify-content-center gallery-row">
                <div class="col-6 col-md-4 gallery-item text-center"><img src="https://picsum.photos" class="img-fluid rounded shadow-sm clickable-img" style="cursor:pointer;" onclick="selectImage(this, event)"></div>
            </div></div></section>`,
            cta: `<section class="py-5 bg-primary text-white text-center"><div class="container"><h2 contenteditable="true">Ready?</h2><button class="btn btn-light mt-3">Join Now</button></div></section>`,
            footer: `<footer class="py-4 bg-dark text-white text-center"><p class="mb-0 small" contenteditable="true">© 2026 Company</p></footer>`,


            // NEW SIDEBAR COMPONENTS
            textblock: `<section class="py-5 bg-light">
                <div class="container">
                    <h2 contenteditable="true" class="display-5 fw-bold removable" data-removable="heading">Section Heading</h2>
                    <p contenteditable="true" class="lead removable" data-removable="paragraph">This is a reusable text block. Fully editable and deletable.</p>
                </div>
            </section>`,

            imgtextblock: `<section class="py-5 bg-white">
                <div class="container">
                    <div class="imgtext-block removable my-5" data-removable="imgtext">
                        <div class="row align-items-center g-4">
                            <div class="col-md-5">
                                <img src="https://picsum.photos/id/1015/600/400" class="img-fluid rounded shadow-sm clickable-img" style="cursor:pointer;" onclick="selectImage(this,event)">
                            </div>
                            <div class="col-md-7">
                                <h4 contenteditable="true">Image Title</h4>
                                <p contenteditable="true">Beautiful description. Change layout in inspector.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>`,

            formblock: `<section class="py-5 bg-light">
                <div class="container">
                    <h2 contenteditable="true" class="text-center mb-5">Get In Touch</h2>
                    <div class="row justify-content-center">
                        <div class="col-lg-6">
                            <form>
                                <div class="mb-3 removable" data-removable="formgroup">
                                    <label contenteditable="true" class="form-label">Full Name</label>
                                    <input type="text" class="form-control" placeholder="John Doe">
                                </div>
                                <div class="mb-3 removable" data-removable="formgroup">
                                    <label contenteditable="true" class="form-label">Email Address</label>
                                    <input type="email" class="form-control" placeholder="you@example.com">
                                </div>
                                <div class="mb-3 removable" data-removable="textarea">
                                    <label contenteditable="true" class="form-label">Your Message</label>
                                    <textarea class="form-control" rows="5" placeholder="Tell us more..."></textarea>
                                </div>
                                <button class="btn btn-primary w-100 removable" data-removable="button">Send Message</button>
                            </form>
                        </div>
                    </div>
                </div>
            </section>`
        };

        // (All previous functions remain exactly the same except the ones below)


        // Enhanced element selection – now detects EVERYTHING
        canvas.addEventListener('click', (e) => {
            let el = e.target.closest('.removable') ||
                e.target.closest('button:not(.btn-sm)') ||
                e.target.closest('.clickable-img') ||
                e.target.closest('h1,h2,h3,h4,h5,h6,p');

            if (!el) return;
            if (e.target.classList.contains('clickable-img')) {
                selectImage(e.target, e);
                return;
            }
            e.stopPropagation();
            selectElement(el);
        });

        function addSection(type) {
            const wrapper = document.createElement('div');
            wrapper.className = 'section-wrapper';
            wrapper.dataset.type = type;
            wrapper.onclick = (e) => {
                if (e.target.closest('[contenteditable]') || e.target.classList.contains('clickable-img')) return;
                e.stopPropagation();
                selectSection(wrapper);
            };
            wrapper.innerHTML = `
                <div class="section-toolbar btn-group shadow">
                    <button class="btn btn-primary btn-sm" onclick="move(this,-1)">↑</button>
                    <button class="btn btn-primary btn-sm" onclick="move(this,1)">↓</button>
                    <button class="btn btn-danger btn-sm" onclick="this.closest('.section-wrapper').remove(); closeInspector();">×</button>
                </div>
                ${templates[type]}`;
            canvas.appendChild(wrapper);
        }

        function selectSection(wrapper) {
            if (activeWrapper) activeWrapper.classList.remove('active');
            activeWrapper = wrapper;
            activeWrapper.classList.add('active');
            inspector.style.display = 'block';

            selectedElement = null;
            document.getElementById('element-settings').style.display = 'none';
            document.getElementById('general-settings').style.display = 'block';

            const target = wrapper.querySelector('section, footer');
            const styles = window.getComputedStyle(target);
            document.getElementById('bgColor').value = rgbToHex(styles.backgroundColor);
            document.getElementById('textColor').value = rgbToHex(styles.color);

            document.getElementById('image-tools').style.display = 'block';
            document.getElementById('addPhotoBtn').style.display = (wrapper.dataset.type === 'gallery') ? 'block' : 'none';
            document.getElementById('card-tools').style.display = (wrapper.dataset.type === 'cards') ? 'block' : 'none';
        }

        function selectElement(el) {
            if (selectedElement) selectedElement.classList.remove('border', 'border-primary', 'border-2');
            selectedElement = el;
            selectedElement.classList.add('border', 'border-primary', 'border-2');

            document.getElementById('element-settings').style.display = 'block';
            document.getElementById('general-settings').style.display = 'none';

            // Reset all specific panels
            document.getElementById('button-settings').style.display = 'none';
            document.getElementById('heading-settings').style.display = 'none';
            document.getElementById('alignment-settings').style.display = 'none';
            document.getElementById('imgtext-settings').style.display = 'none';
            document.getElementById('form-control-settings').style.display = 'none';

            // Button
            if (el.tagName === 'BUTTON') {
                document.getElementById('button-settings').style.display = 'block';
                const cls = Array.from(el.classList).find(c => c.startsWith('btn-') && c !== 'btn') || 'primary';
                document.getElementById('btnStyle').value = cls.replace('btn-', '');
                document.getElementById('btnSize').value = Array.from(el.classList).find(c => c === 'btn-sm' || c === 'btn-lg') || '';
            }

            // Heading
            if (['H1', 'H2', 'H3', 'H4', 'H5', 'H6'].includes(el.tagName)) {
                document.getElementById('heading-settings').style.display = 'block';
                document.getElementById('alignment-settings').style.display = 'block';
                document.getElementById('headingLevel').value = el.tagName.toLowerCase();
            }

            // Paragraph
            if (el.tagName === 'P') {
                document.getElementById('alignment-settings').style.display = 'block';
            }

            // Image + Text Block
            if (el.classList.contains('imgtext-block')) {
                document.getElementById('imgtext-settings').style.display = 'block';
                const row = el.querySelector('.row');
                document.getElementById('imgtextLayout').value = row.classList.contains('flex-row-reverse') ? 'right' :
                    row.classList.contains('flex-column') ? 'top' : 'left';
            }

            // Form controls (input, textarea, select inside removable)
            const formControl = el.querySelector('input, textarea, select') || (['INPUT', 'TEXTAREA', 'SELECT'].includes(el.tagName) ? el : null);
            if (formControl) {
                document.getElementById('form-control-settings').style.display = 'block';
                document.getElementById('formPlaceholder').value = formControl.placeholder || '';
                if (formControl.tagName === 'INPUT') document.getElementById('formType').value = formControl.type;
            }
        }

        // NEW EDIT FUNCTIONS (covers all elements)
        function updateHeadingLevel() {
            if (!selectedElement || !['H1', 'H2', 'H3', 'H4', 'H5', 'H6'].includes(selectedElement.tagName)) return;
            const newTag = document.getElementById('headingLevel').value;
            const newEl = document.createElement(newTag);
            newEl.innerHTML = selectedElement.innerHTML;
            newEl.contentEditable = true;
            newEl.className = selectedElement.className;
            selectedElement.parentNode.replaceChild(newEl, selectedElement);
            selectedElement = newEl;
            newEl.classList.add('border', 'border-primary', 'border-2');
        }

        function setAlignment(align) {
            if (!selectedElement) return;
            selectedElement.classList.remove('text-start', 'text-center', 'text-end');
            selectedElement.classList.add(`text-${align}`);
        }

        function updateButtonSize() {
            if (!selectedElement || selectedElement.tagName !== 'BUTTON') return;
            const size = document.getElementById('btnSize').value;
            selectedElement.className = selectedElement.className.replace(/btn-(sm|lg)/g, '').trim() + (size ? ` ${size}` : '');
        }

        function updateFormPlaceholder(val) {
            if (!selectedElement) return;
            const control = selectedElement.querySelector('input, textarea, select') || selectedElement;
            if (control && control.tagName !== 'SELECT') control.placeholder = val;
        }

        function updateFormType(val) {
            if (!selectedElement) return;
            const control = selectedElement.querySelector('input') || selectedElement;
            if (control && control.tagName === 'INPUT') control.type = val;
        }

        function selectImage(img, e) {
            e.stopPropagation();
            selectedImgElement = img;
            document.querySelectorAll('.clickable-img').forEach(i => i.style.outline = "none");
            img.style.outline = "3px solid #0d6efd";
            document.getElementById('imgUrl').value = img.src;
        }

        function addPhoto() {
            if (activeWrapper && activeWrapper.dataset.type === 'gallery') {
                const row = activeWrapper.querySelector('.gallery-row');
                const col = document.createElement('div');
                col.className = 'col-6 col-md-4 gallery-item text-center';
                col.innerHTML = `<img src="https://picsum.photos{Math.random()}" class="img-fluid rounded shadow-sm clickable-img" style="cursor:pointer;" onclick="selectImage(this, event)">`;
                row.appendChild(col);
            }
        }

        function updateSectionStyle(prop, val) {
            if (!activeWrapper) return;
            const target = activeWrapper.querySelector('section, footer');
            const classesToRemove = ['bg-dark', 'bg-light', 'bg-primary', 'text-white', 'text-dark'];
            target.classList.remove(...classesToRemove);
            target.style[prop] = val;
        }

        function updatePadding(val) {
            const el = activeWrapper.querySelector('section, footer');
            el.className = el.className.replace(/py-\d/, 'py-' + val);
        }

        function updateImage(url) {
            if (!activeWrapper) return;
            const section = activeWrapper.querySelector('section');
            if (activeWrapper.dataset.type === 'hero') {
                section.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('${url}')`;
            } else if (selectedImgElement) {
                selectedImgElement.src = url;
            }
        }

        function addColumn() {
            const row = activeWrapper.querySelector('.row');
            const col = document.createElement('div');
            col.className = 'col-md-4';
            col.innerHTML = `<div class="card h-100 border-0 shadow-sm"><div class="card-body"><h5 contenteditable="true">Feature</h5><p contenteditable="true">Description.</p></div></div>`;
            row.appendChild(col);
        }

        // Insert block INSIDE currently active section (or at root if none selected)
        function addBlock(type) {
            if (!activeWrapper) {
                alert("Please select a section first (click on it in the canvas)");
                return;
            }

            const container = activeWrapper.querySelector('.container') ||
                activeWrapper.querySelector('section, footer') ||
                activeWrapper;

            if (!container) return;

            let content = '';

            switch (type) {
                case 'text':
                    content = `
                <div class="my-5 removable">
                    <h2 contenteditable="true" class="display-5 fw-bold">Your Heading</h2>
                    <p contenteditable="true" class="lead">
                        Edit this text directly. You can change alignment, size etc. in the inspector when selected.
                    </p>
                </div>
            `;
                    break;

                case 'imgtext':
                    content = `
                <div class="row g-5 align-items-center my-5 removable imgtext-block" data-removable="imgtext">
                    <div class="col-lg-6">
                        <img src="https://picsum.photos/800/500?random=${Math.random()}" 
                             class="img-fluid rounded shadow clickable-img" 
                             style="cursor:pointer;" 
                             onclick="selectImage(this, event)">
                    </div>
                    <div class="col-lg-6">
                        <h3 contenteditable="true">Feature or Benefit</h3>
                        <p contenteditable="true">Explain why this is great. You can change layout (image left/right/top) via inspector.</p>
                        <a href="#" class="btn btn-primary removable" data-removable="button">Learn more →</a>
                    </div>
                </div>
            `;
                    break;

                case 'form':
                    content = `
                <div class="my-5 removable">
                    <form class="row g-3 justify-content-center">
                        <div class="col-md-6">
                            <label contenteditable="true" class="form-label">Name</label>
                            <input type="text" class="form-control" placeholder="Your name">
                        </div>
                        <div class="col-md-6">
                            <label contenteditable="true" class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="name@example.com">
                        </div>
                        <div class="col-12">
                            <label contenteditable="true" class="form-label">Message</label>
                            <textarea class="form-control" rows="4" placeholder="How can we help?"></textarea>
                        </div>
                        <div class="col-12 text-center mt-3">
                            <button type="button" class="btn btn-primary px-5 removable" data-removable="button">Send</button>
                        </div>
                    </form>
                </div>
            `;
                    break;

                // Add more cases as needed (pricing, testimonial, stats, etc.)
                default:
                    content = `<div class="my-5 alert alert-warning removable">Block type "${type}" not implemented yet</div>`;
            }

            const div = document.createElement('div');
            div.innerHTML = content;
            container.appendChild(div.firstElementChild || div);

            // Optional: scroll to the new block
            div.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        function move(btn, dir) {
            const wrap = btn.closest('.section-wrapper');
            if (dir === -1 && wrap.previousElementSibling) canvas.insertBefore(wrap, wrap.previousElementSibling);
            if (dir === 1 && wrap.nextElementSibling) canvas.insertBefore(wrap.nextElementSibling, wrap);
        }

        function closeInspector() {
            inspector.style.display = 'none';
            if (activeWrapper) activeWrapper.classList.remove('active');
            activeWrapper = null;
        }

        function deselect(e) { if (e.target === canvas || e.target.id === 'canvas-container') closeInspector(); }

        function rgbToHex(rgb) {
            if (!rgb || rgb === 'transparent' || rgb.includes('rgba(0, 0, 0, 0)')) return '#ffffff';
            const vals = rgb.match(/\d+/g);
            return "#" + vals.slice(0, 3).map(x => parseInt(x).toString(16).padStart(2, '0')).join('');
        }

        function exportPage() {
            const clone = canvas.cloneNode(true);
            let content = "";
            clone.querySelectorAll('.section-wrapper').forEach(w => {
                w.querySelectorAll('.section-toolbar').forEach(t => t.remove());
                const section = w.querySelector('section, footer');
                if (section) {
                    section.removeAttribute('contenteditable');
                    section.querySelectorAll('[contenteditable]').forEach(e => e.removeAttribute('contenteditable'));
                    content += section.outerHTML;
                }
            });
            const blob = new Blob([`<!DOCTYPE html><html><head><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head><body>${content}</body></html>`], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'index.html';
            a.click();
        }
        function deselect(e) {
            if (e.target === canvas || e.target === document.getElementById('canvas-container')) closeInspector();
        }

        function rgbToHex(rgb) {
            if (!rgb || rgb === 'transparent' || rgb.includes('rgba(0, 0, 0, 0)')) return '#ffffff';
            const vals = rgb.match(/\d+/g);
            return '#' + vals.slice(0, 3).map(x => parseInt(x).toString(16).padStart(2, '0')).join('');
        }
    </script>
</body>
