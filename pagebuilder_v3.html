<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Builder Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; height: 100vh; overflow: hidden; background: #f0f2f5; }
        #sidebar { width: 260px; background: #212529; color: white; padding: 20px; overflow-y: auto; }
        #canvas-container { flex: 1; overflow-y: auto; padding: 40px; display: flex; justify-content: center; }
        #canvas { width: 100%; max-width: 1000px; background: white; min-height: 100%; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        #inspector { width: 300px; background: white; border-left: 1px solid #dee2e6; padding: 20px; display: none; }

        .section-wrapper { position: relative; cursor: pointer; border: 1px solid transparent; }
        .section-wrapper:hover { border: 1px solid #0d6efd; }
        .section-wrapper.active { border: 2px solid #0d6efd; z-index: 10; }

        .section-toolbar {
            position: absolute; top: 5px; right: 5px; display: none; z-index: 100;
            background: #0d6efd; border-radius: 4px; padding: 2px;
        }
        .section-wrapper:hover > .section-toolbar { display: flex; }
        [contenteditable]:focus { outline: 2px solid #0d6efd; background: rgba(13, 110, 253, 0.05); }
        .inspector-label { font-size: 0.75rem; font-weight: bold; color: #6c757d; text-transform: uppercase; margin-top: 15px; display: block; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h5 class="mb-4">Components</h5>
        <div class="d-grid gap-2">
            <button class="btn btn-outline-light btn-sm text-start" onclick="addSection('hero')">+ Hero Section</button>
            <button class="btn btn-outline-light btn-sm text-start" onclick="addSection('cards')">+ Feature Cards</button>
            <button class="btn btn-outline-light btn-sm text-start" onclick="addSection('gallery')">+ Image Gallery</button>
            <button class="btn btn-outline-light btn-sm text-start" onclick="addSection('cta')">+ Call to Action</button>
            <button class="btn btn-outline-light btn-sm text-start" onclick="addSection('footer')">+ Footer</button>
        </div>
        <hr>
        <button class="btn btn-primary w-100" onclick="exportPage()">Export HTML</button>
        <button class="btn btn-link btn-sm text-secondary w-100 mt-2" onclick="canvas.innerHTML = ''; closeInspector();">Clear All</button>
    </div>

    <div id="canvas-container">
        <div id="canvas" onclick="deselect(event)"></div>
    </div>

    <div id="inspector">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h6 class="m-0">Section Settings</h6>
            <button class="btn-close btn-sm" onclick="closeInspector()"></button>
        </div>
        
        <label class="inspector-label">Background</label>
        <input type="color" class="form-control form-control-color w-100" id="bgColor" oninput="updateStyle('backgroundColor', this.value)">

        <label class="inspector-label">Text Color</label>
        <input type="color" class="form-control form-control-color w-100" id="textColor" oninput="updateStyle('color', this.value)">

        <label class="inspector-label">Vertical Padding</label>
        <input type="range" class="form-range" min="0" max="5" step="1" id="paddingRange" oninput="updatePadding(this.value)">

        <div id="image-tools" style="display:none;">
            <label class="inspector-label">Image/BG URL</label>
            <input type="text" class="form-control form-control-sm" id="imgUrl" onchange="updateImage(this.value)">
        </div>

        <div id="card-tools" style="display:none;">
            <label class="inspector-label">Layout</label>
            <button class="btn btn-sm btn-outline-primary w-100 mt-2" onclick="addColumn()">+ Add Card</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const inspector = document.getElementById('inspector');
        let activeWrapper = null;

        const templates = {
            hero: `<section class="py-5 text-center text-white bg-dark" style="background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://picsum.photos'); background-size: cover; background-position: center;">
                <div class="container py-5"><h1 class="display-4 fw-bold" contenteditable="true">Modern Design</h1><p class="lead" contenteditable="true">Click to edit this text and build your site.</p></div></section>`,
            cards: `<section class="py-5 bg-light"><div class="container"><div class="row g-4 justify-content-center">
                <div class="col-md-4"><div class="card h-100 border-0 shadow-sm"><div class="card-body"><h5 contenteditable="true">Feature</h5><p contenteditable="true">Description goes here.</p></div></div></div>
            </div></div></section>`,
            gallery: `<section class="py-5"><div class="container"><div class="row g-2">
                <div class="col-4"><img src="https://picsum.photos" class="img-fluid rounded"></div>
            </div></div></section>`,
            cta: `<section class="py-5 bg-primary text-white text-center"><div class="container"><h2 contenteditable="true">Ready to start?</h2><button class="btn btn-light btn-lg mt-3">Get Started</button></div></section>`,
            footer: `<footer class="py-4 bg-dark text-white text-center border-top"><p class="mb-0 small" contenteditable="true">© 2026 Your Company</p></footer>`
        };

        function addSection(type) {
            const wrapper = document.createElement('div');
            wrapper.className = 'section-wrapper';
            wrapper.dataset.type = type;
            wrapper.onclick = (e) => { e.stopPropagation(); selectSection(wrapper); };
            wrapper.innerHTML = `
                <div class="section-toolbar btn-group">
                    <button class="btn btn-primary btn-sm" onclick="move(this, -1)">↑</button>
                    <button class="btn btn-primary btn-sm" onclick="move(this, 1)">↓</button>
                    <button class="btn btn-danger btn-sm" onclick="this.closest('.section-wrapper').remove(); closeInspector();">×</button>
                </div>
                ${templates[type]}`;
            canvas.appendChild(wrapper);
        }

        function selectSection(wrapper) {
            if(activeWrapper) activeWrapper.classList.remove('active');
            activeWrapper = wrapper;
            activeWrapper.classList.add('active');
            inspector.style.display = 'block';

            const section = wrapper.querySelector('section, footer');
            document.getElementById('bgColor').value = rgbToHex(window.getComputedStyle(section).backgroundColor);
            document.getElementById('textColor').value = rgbToHex(window.getComputedStyle(section).color);
            
            document.getElementById('image-tools').style.display = (['hero', 'gallery'].includes(wrapper.dataset.type)) ? 'block' : 'none';
            document.getElementById('card-tools').style.display = (wrapper.dataset.type === 'cards') ? 'block' : 'none';
        }

        function updateStyle(prop, val) {
            if(activeWrapper) activeWrapper.querySelector('section, footer').style[prop] = val;
        }

        function updatePadding(val) {
            const el = activeWrapper.querySelector('section, footer');
            el.className = el.className.replace(/py-\d/, 'py-' + val);
        }

        function updateImage(url) {
            const el = activeWrapper.querySelector('section, footer');
            if(activeWrapper.dataset.type === 'hero') el.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('${url}')`;
            if(activeWrapper.dataset.type === 'gallery') activeWrapper.querySelector('img').src = url;
        }

        function addColumn() {
            const row = activeWrapper.querySelector('.row');
            const col = document.createElement('div');
            col.className = 'col-md-4';
            col.innerHTML = `<div class="card h-100 border-0 shadow-sm"><div class="card-body"><h5 contenteditable="true">New Item</h5><p contenteditable="true">Description...</p></div></div>`;
            row.appendChild(col);
        }

        function move(btn, dir) {
            const wrap = btn.closest('.section-wrapper');
            if(dir === -1 && wrap.previousElementSibling) canvas.insertBefore(wrap, wrap.previousElementSibling);
            if(dir === 1 && wrap.nextElementSibling) canvas.insertBefore(wrap.nextElementSibling, wrap);
        }

        function closeInspector() { inspector.style.display = 'none'; if(activeWrapper) activeWrapper.classList.remove('active'); }
        function deselect(e) { if(e.target === canvas) closeInspector(); }
        function rgbToHex(rgb) { 
            const res = rgb.match(/\d+/g);
            return res ? "#" + res.slice(0,3).map(x => parseInt(x).toString(16).padStart(2, '0')).join('') : '#ffffff';
        }

        function exportPage() {
            const clone = canvas.cloneNode(true);
            let finalHtml = "";
            clone.querySelectorAll('.section-wrapper').forEach(wrapper => {
                wrapper.querySelectorAll('.section-toolbar').forEach(t => t.remove());
                const section = wrapper.querySelector('section, footer');
                if(section) {
                    section.removeAttribute('contenteditable');
                    section.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
                    finalHtml += section.outerHTML;
                }
            });

            const template = `<!DOCTYPE html><html><head>
                <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
                <style>body { overflow-x: hidden; }</style></head><body>${finalHtml}</body></html>`;

            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([template], { type: "text/html" }));
            link.download = "index.html";
            link.click();
        }
    </script>
</body>
</html>
